<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiara</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

<header>
  <div class="logo-wrap">

    <img src="/static/img/SAC-Logo.jpg" class="logo-img" alt="SAC Logo">

    <div class="logo-sub">
      Servicios Avanzados de Consultoría
    </div>

  </div>

  <h1 class="header-title">Tiara</h1>
</header>

<main>
  <div class="welcome-screen" id="welcome-screen">
    <h2>Bienvenido a TIARA</h2>
    <p>¿En qué puedo ayudarte hoy?</p>
  </div>
  <div id="chat-container"></div>
</main>

<div class="input-area">

  <div class="input-inner">

    <input
      type="text"
      id="user-input"
      placeholder="Escribe tu pregunta aquí"
      autocomplete="off"
    />

    <div class="btn-row">
      <button class="btn btn-reset hidden" id="reset-btn">
        Reiniciar Conversación
      </button>

      <button class="btn btn-send" id="send-btn">
        Enviar Mensaje
      </button>
    </div>

  </div>

</div>

<script src="/static/js/chat.js"></script>

</body>
</html>
