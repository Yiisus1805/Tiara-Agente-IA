<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIARA - Chat SQL</title>

  <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>TIARA</h1>
      <p>SAC PANAMÁ</p>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="controls">
        <button onclick="clearConversation()">Limpiar Chat</button>
      </div>

      <div class="input-group">
        <input
          type="text"
          id="questionInput"
          placeholder="Pregunta sobre tu base de datos..."
          onkeypress="handleKeyPress(event)"
        >
        <button onclick="sendMessage()" id="sendBtn">Enviar</button>
      </div>
    </div>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
